name: Build Debug Repo

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  build_and_publish:
    name: Build Debug and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Construct debug Repo
        run: ./gradlew :constructDebugRepo --stacktrace

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          ref: repo
          path: repo-branch

      - name: Copy new contents
        run: |
          cd repo-branch
          rm -rf *
          cp -a ../build/repo/debug/. .
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Publish debug extension repo [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
